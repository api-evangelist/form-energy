aid: form-energy
name: Form Energy
description: >-
  Form Energy is a long-duration energy storage company headquartered in Somerville,
  Massachusetts and Weirton, West Virginia. Its flagship product is an iron-air
  battery designed to store electricity for up to 100 hours, intended to enable
  utilities and grid operators to firm renewable generation across multi-day
  weather events, replace aging fossil-fueled peakers, and defer transmission and
  distribution upgrades. The company manufactures its battery at Form Factory 1,
  a 550,000-square-foot facility built on the former Weirton Steel mill site that
  employs roughly 400 people. Form Energy also publishes Formware, a grid-modeling
  software suite used by utilities to plan resource portfolios that include
  multi-day storage. Notable customers and partners include Georgia Power,
  Xcel Energy, Great River Energy, Dominion Energy, PG&E, New York Power
  Authority, and Crusoe Energy (a 12 GWh agreement to firm power for AI data
  centers). Form Energy does not currently publish a public developer API or SDK;
  engagement is through utility sales, partnership, and policy channels.
